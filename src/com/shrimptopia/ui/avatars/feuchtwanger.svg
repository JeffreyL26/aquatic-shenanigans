    </linearGradient>
    <clipPath id="fw-eyeL"><path d="M232 312 Q248 302 262 303 Q276 304 286 313 Q274 320 259 320 Q245 320 232 312 Z"></path></clipPath>
    <clipPath id="fw-eyeR"><path d="M314 313 Q324 304 338 303 Q352 302 368 312 Q356 320 341 320 Q326 320 314 313 Z"></path></clipPath>
