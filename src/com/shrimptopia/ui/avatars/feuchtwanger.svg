    <path d="M312 288 L372 288" stroke="#5a5147" stroke-width="6" stroke-linecap="round"></path>
    <!-- Augenringe -->
    <path d="M236 330 Q258 338 284 330 M316 330 Q342 338 364 330" fill="none" stroke="#b98f6d" stroke-width="4" stroke-linecap="round"></path>

    <!-- Nase -->
    <path d="M300 316 C294 340 288 356 294 366 Q300 374 312 366" fill="none" stroke="#b98f6d" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"></path>

    <!-- Mund: absolut gerade Linie -->
    <path d="M268 396 L332 396" stroke="#3a2f2a" stroke-width="5.5" stroke-linecap="round"></path>

    <!-- Formular X-0/Shrimp in der Brusttasche -->
    <g stroke="#1c2433" stroke-width="5" stroke-linejoin="round">
      <rect x="360" y="486" width="70" height="90" rx="4" fill="#f2ead2" transform="rotate(8 395 531)"></rect>
      <path d="M372 506 L426 514 M370 522 L424 530 M368 538 L410 544" stroke="#a99b78" stroke-width="4"></path>
