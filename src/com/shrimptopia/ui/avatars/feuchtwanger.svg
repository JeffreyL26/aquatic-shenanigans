    <path d="M228 246 C258 226 310 220 352 232" fill="none" stroke="#b9bcc2" stroke-width="5" stroke-linecap="round"></path>

    <!-- Randlose Brille + muede Augen -->
    <path d="M232 312 Q248 302 262 303 Q276 304 286 313 Q274 320 259 320 Q245 320 232 312 Z" fill="#f4f3ee"></path>
    <path d="M314 313 Q324 304 338 303 Q352 302 368 312 Q356 320 341 320 Q326 320 314 313 Z" fill="#f4f3ee"></path>
    <g clip-path="url(#fw-eyeL)"><circle cx="260" cy="313" r="9" fill="#4d5560"></circle><circle cx="260" cy="313" r="4.6" fill="#14100c"></circle><circle cx="257" cy="310" r="2.2" fill="#fff"></circle></g>
    <g clip-path="url(#fw-eyeR)"><circle cx="340" cy="313" r="9" fill="#4d5560"></circle><circle cx="340" cy="313" r="4.6" fill="#14100c"></circle><circle cx="337" cy="310" r="2.2" fill="#fff"></circle></g>
    <g fill="none" stroke="#39404a" stroke-width="3.5">
