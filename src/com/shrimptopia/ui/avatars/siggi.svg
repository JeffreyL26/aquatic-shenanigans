<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600" role="img" aria-label="Siggi Scampi avatar">
  <defs>
    <clipPath id="s-frame"><circle cx="300" cy="300" r="286"></circle></clipPath>
    <radialGradient id="s-bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#f3d06a"></stop><stop offset="100%" stop-color="#cf9e2e"></stop>
    </radialGradient>
    <linearGradient id="s-hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b3a44"></stop><stop offset="100%" stop-color="#232229"></stop>
    </linearGradient>
    <linearGradient id="s-jacket" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c04a92"></stop><stop offset="100%" stop-color="#7c2d7a"></stop>
    </linearGradient>
  </defs>

  <circle cx="300" cy="300" r="298" fill="#0c1519"></circle>
  <circle cx="300" cy="300" r="286" fill="url(#s-bg)"></circle>
  <circle cx="300" cy="300" r="286" fill="#0c1519" opacity="0.10" style="mix-blend-mode:multiply"></circle>

  <g clip-path="url(#s-frame)">
    <ellipse cx="300" cy="566" rx="320" ry="130" fill="#b8891f"></ellipse>

    <!-- Glitzer-Sakko über schwarzem Rollkragen -->
    <g stroke="#241a16" stroke-width="7" stroke-linejoin="round">
      <path d="M300 462 C184 462 110 514 88 600 L512 600 C490 514 416 462 300 462 Z" fill="url(#s-jacket)"></path>
      <path d="M262 470 L300 540 L338 470 L318 462 L300 496 L282 462 Z" fill="#1c1a20"></path>
      <path d="M242 476 C220 500 206 540 200 600 L232 600 C236 546 248 508 264 486 Z" fill="#a63f85" stroke-width="5"></path>
      <path d="M358 476 C380 500 394 540 400 600 L368 600 C364 546 352 508 336 486 Z" fill="#a63f85" stroke-width="5"></path>
    </g>
    <!-- Pailletten -->
    <g fill="#ffd9f0" opacity="0.75">
      <circle cx="238" cy="520" r="4"></circle><circle cx="262" cy="556" r="3.4"></circle>
      <circle cx="352" cy="524" r="4"></circle><circle cx="376" cy="560" r="3.4"></circle>
      <circle cx="216" cy="560" r="3.2"></circle><circle cx="392" cy="586" r="3.6"></circle>
    </g>
    <!-- Goldkette mit Shrimp-Anhänger -->
    <path d="M266 488 Q300 528 334 488" fill="none" stroke="#f6c644" stroke-width="9" stroke-linecap="round"></path>
    <path d="M266 488 Q300 528 334 488" fill="none" stroke="#a97b12" stroke-width="3" stroke-dasharray="4 6"></path>
    <path d="M292 522 q4 -8 12 -6 q10 3 8 13 q-2 9 -12 10 q-4 0 -6 -3" fill="none" stroke="#f6c644" stroke-width="7" stroke-linecap="round"></path>

    <!-- Hals -->
    <path d="M272 408 L272 470 Q300 490 328 470 L328 408 Z" fill="#e0b18b" stroke="#241a16" stroke-width="7" stroke-linejoin="round"></path>
    <path d="M272 430 Q300 448 328 430 L328 408 L272 408 Z" fill="#cd9a72" stroke="none"></path>

    <!-- Ohren + Klunker-Ohrring -->
    <path d="M196 306 q-20 2 -18 24 q3 20 22 20 q9 -2 9 -13 z" fill="#e0b18b" stroke="#241a16" stroke-width="7" stroke-linejoin="round"></path>
    <path d="M404 306 q20 2 18 24 q-3 20 -22 20 q-9 -2 -9 -13 z" fill="#e0b18b" stroke="#241a16" stroke-width="7" stroke-linejoin="round"></path>
    <circle cx="414" cy="352" r="7" fill="#f6c644" stroke="#241a16" stroke-width="4"></circle>

    <!-- Vokuhila: Hinterkopf + lange Matte -->
    <path d="M300 150 C206 150 166 222 166 306 C166 380 180 440 206 486 L246 466 C222 410 220 330 232 288 C266 306 334 306 368 288 C380 330 378 410 354 466 L394 486 C420 440 434 380 434 306 C434 222 394 150 300 150 Z" fill="url(#s-hair)" stroke="#241a16" stroke-width="7" stroke-linejoin="round"></path>

    <!-- Gesicht (sonnenstudiogebräunt) -->
    <path d="M300 180 C236 180 200 226 200 296 C200 340 214 380 242 404 C262 420 338 420 358 404 C386 380 400 340 400 296 C400 226 364 180 300 180 Z" fill="#e8b98a" stroke="#241a16" stroke-width="7" stroke-linejoin="round"></path>

    <!-- Föhnwelle vorne -->
    <path d="M200 296 C198 218 240 178 300 178 C360 178 402 218 400 296 C392 250 372 238 340 246 C348 222 320 208 300 224 C280 208 252 222 260 246 C228 238 208 250 200 296 Z" fill="url(#s-hair)" stroke="#241a16" stroke-width="7" stroke-linejoin="round"></path>

    <!-- Sonnenbrille (gold gerahmt, nie abgenommen seit 1994) -->
    <g>
      <rect x="222" y="286" width="76" height="52" rx="16" fill="#141318" stroke="#f6c644" stroke-width="6"></rect>
      <rect x="302" y="286" width="76" height="52" rx="16" fill="#141318" stroke="#f6c644" stroke-width="6"></rect>
      <path d="M298 306 h4" stroke="#f6c644" stroke-width="8"></path>
      <path d="M222 304 q-20 -6 -30 8" fill="none" stroke="#f6c644" stroke-width="6" stroke-linecap="round"></path>
      <path d="M378 304 q20 -6 30 8" fill="none" stroke="#f6c644" stroke-width="6" stroke-linecap="round"></path>
      <path d="M234 298 q16 -8 34 2" fill="none" stroke="#5a5866" stroke-width="5" stroke-linecap="round" opacity="0.9"></path>
      <path d="M314 298 q16 -8 34 2" fill="none" stroke="#5a5866" stroke-width="5" stroke-linecap="round" opacity="0.9"></path>
    </g>

    <!-- Nase -->
    <path d="M298 336 C293 348 287 356 294 362 Q300 367 310 360" fill="none" stroke="#c99465" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"></path>

    <!-- Breites Produzenten-Grinsen mit Goldzahn -->
    <path d="M254 382 Q300 424 346 382 Q300 398 254 382 Z" fill="#7a2f3a"></path>
    <path d="M254 382 Q300 396 346 382 Q300 390 254 382 Z" fill="#ffffff"></path>
    <rect x="322" y="384" width="11" height="8" rx="2" fill="#f6c644"></rect>
    <path d="M254 382 Q300 424 346 382" fill="none" stroke="#241a16" stroke-width="6" stroke-linecap="round"></path>
    <path d="M254 382 Q300 396 346 382" fill="none" stroke="#241a16" stroke-width="4"></path>

    <!-- Mikro in der Hand -->
    <g transform="rotate(14 452 486)">
      <rect x="440" y="470" width="24" height="90" rx="10" fill="#2b323c" stroke="#141a20" stroke-width="5"></rect>
      <circle cx="452" cy="462" r="26" fill="#8a99a2" stroke="#141a20" stroke-width="5"></circle>
      <path d="M436 452 h32 M436 462 h32 M436 472 h32" stroke="#4a555e" stroke-width="3"></path>
    </g>

    <!-- Notenfunken -->
    <g fill="#fff8e0" opacity="0.95">
      <path d="M158 232 l3 -26 q14 2 16 10 q1 8 -8 8 q-6 0 -7 -6" stroke="#fff8e0" stroke-width="4" fill="none" stroke-linecap="round"></path>
      <circle cx="152" cy="236" r="7"></circle>
      <path d="M446 204 l3 -22 q12 2 13 9 q0 7 -7 7 q-5 0 -6 -5" stroke="#fff8e0" stroke-width="4" fill="none" stroke-linecap="round"></path>
      <circle cx="441" cy="208" r="6"></circle>
    </g>
  </g>
</svg>
